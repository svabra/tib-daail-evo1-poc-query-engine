apiVersion: v1
kind: ConfigMap
metadata:
  name: tib-daail-evo1-poc-query-engine-config
  namespace: daai-brs-d
  labels:
    app.kubernetes.io/name: tib-daail-evo1-poc-query-engine
data:
  HOME: /tmp
  DUCKDB_UI_PORT: "4213"
  DUCKDB_DATABASE: /tmp/workspace/workspace.duckdb
  DUCKDB_EXTRA_EXTENSIONS: httpfs,postgres
  DUCKDB_EXTENSION_DIRECTORY: /opt/duckdb/extensions
  S3_ENDPOINT: https://ecspr01.sz.admin.ch:9021
  S3_BUCKET: replace-me-bucket
  S3_USE_SSL: "true"
  S3_VERIFY_SSL: "true"
  S3_CA_CERT_FILE: /myconfigmap/daai-brs-d/bit-ros-trusted-certs/ca-bundle.crt
  # The app logs whether this exact file exists. If it does not, startup falls
  # back to scanning the mounted configmap directory and logs every candidate file.
  # ECS is expected to use path-style requests so the TLS certificate matches
  # the configured endpoint host instead of bucket-prefixed virtual hosts.
  S3_URL_STYLE: path
  S3_STARTUP_VIEW_SCHEMA: s3
  # Example:
  # S3_STARTUP_VIEWS: vat_smoke=parquet:s3://vat-smoke-test/startup/vat_smoke.parquet
  PG_HOST: replace-me-postgres-service
  PG_PORT: "5432"
  PG_OLTP_DATABASE: evo1_oltp
  PG_OLAP_DATABASE: evo1_olap
