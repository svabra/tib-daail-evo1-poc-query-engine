apiVersion: apps/v1
kind: Deployment
metadata:
  name: evo1-bdw
  namespace: daai-brs-d
  labels:
    app.kubernetes.io/name: evo1-bdw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: evo1-bdw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evo1-bdw
    spec:
      serviceAccountName: evo1-bdw
      containers:
        - name: bdw
          image: docker-hub.nexus.bit.admin.ch/svabra/bit-data-workbench:0.5.6
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: tib-daail-evo1-poc-query-engine-config
            - secretRef:
                name: tib-daail-evo1-poc-query-engine-secret
          env:
            - name: BDW_ENABLE_FILE_LOGGING
              value: "false"
            - name: DUCKDB_DATABASE
              value: /tmp/workspace/workspace.duckdb
            - name: BDW_SERVICE_CONSUMPTION_DATA_DIR
              value: /workspace/service-consumption
            - name: BDW_SERVICE_CONSUMPTION_CPU_MEMORY_INTERVAL_SECONDS
              value: "3"
            - name: BDW_SERVICE_CONSUMPTION_S3_INTERVAL_SECONDS
              value: "3600"
            - name: BDW_SERVICE_CONSUMPTION_RETENTION_HOURS
              value: "48"
            - name: BDW_APP_STORAGE_PVC_NAME
              value: evo1-bdw-storage
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: app-storage
              mountPath: /workspace/service-consumption
            - name: bit-ros-trusted-certs
              mountPath: /myconfigmap/daai-brs-d/bit-ros-trusted-certs
              readOnly: true
          resources:
            requests:
              cpu: "4"
              memory: 4Gi
            limits:
              cpu: "8"
              memory: 12Gi
          startupProbe:
            httpGet:
              path: /info
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /info
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /info
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: workspace
          emptyDir: {}
        - name: app-storage
          persistentVolumeClaim:
            claimName: evo1-bdw-storage
        - name: bit-ros-trusted-certs
          configMap:
            name: bit-ros-trusted-certs
