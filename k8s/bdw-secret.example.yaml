# Shared runtime credentials for the BDW application.
# The Secret object name stays stable to avoid breaking existing clusters.
apiVersion: v1
kind: Secret
metadata:
  name: tib-daail-evo1-poc-query-engine-secret
  namespace: daai-brs-d
  labels:
    app.kubernetes.io/name: tib-daail-evo1-poc-query-engine
type: Opaque
stringData:
  # RHOS cluster setup: S3 credentials are supplied as environment variables
  # from this Kubernetes Secret.
  S3_ACCESS_KEY_ID: replace-me
  S3_SECRET_ACCESS_KEY: replace-me
  # Optional:
  # S3_SESSION_TOKEN: replace-me
  PG_USER: replace-me
  PG_PASSWORD: replace-me
