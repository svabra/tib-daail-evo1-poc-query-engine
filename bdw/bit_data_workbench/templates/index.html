{% extends "layout.html" %}

{% block body %}
  <div class="shell">
    {% include "partials/sidebar.html" %}
    <div
      class="sidebar-resizer"
      data-sidebar-resizer
      role="separator"
      aria-orientation="vertical"
      aria-label="Resize navigation"
      aria-valuemin="360"
      aria-valuemax="720"
      tabindex="0"
      title="Drag to resize navigation"
    ></div>

    <main class="workspace-shell">
      <header class="topbar">
        <div class="brand">
          <a
            href="/"
            class="brand-home-link"
            aria-label="Go to the welcome page"
            title="Welcome page"
          >
            <img
              class="brand-mark"
              src="/static/img/swiss-confederation-logo.png"
              alt="Schweizerische Eidgenossenschaft"
            >
          </a>
          <div class="brand-copy">
            <h1>{{ title }}</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <button
            type="button"
            class="topbar-action-button topbar-action-button-icon-only"
            data-open-query-workbench
            aria-label="Query Workbench"
            title="Query Workbench"
          >
            <svg class="topbar-action-icon" viewBox="0 0 16 16" aria-hidden="true">
              <rect x="2.1" y="2.4" width="11.8" height="11.2" rx="1.2"></rect>
              <path d="M2.8 6.2h10.4"></path>
              <path d="M5.4 9.1 7 10.7 10.6 7.1"></path>
            </svg>
          </button>
          <button
            type="button"
            class="topbar-action-button topbar-action-button-icon-only"
            data-open-ingestion-workbench
            aria-label="Ingestion Workbench"
            title="Ingestion Workbench"
          >
            <svg class="topbar-action-icon" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 1.1v4.9"></path>
              <path d="M5.5 4.2 8 6.7l2.5-2.5"></path>
              <ellipse cx="8" cy="8.6" rx="4" ry="1.7"></ellipse>
              <path d="M4 8.6v3.6c0 .9 1.8 1.7 4 1.7s4-.8 4-1.7V8.6"></path>
              <path d="M4 10.5c0 .9 1.8 1.7 4 1.7s4-.8 4-1.7"></path>
            </svg>
          </button>
          <button
            type="button"
            class="topbar-action-button topbar-action-button-muted topbar-action-button-icon-only"
            aria-disabled="true"
            aria-label="Governance Workbench"
            title="Governance Workbench"
          >
            <svg class="topbar-action-icon" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 1.7 12.8 3v3.6c0 3.2-1.7 5.2-4.8 7.7C4.9 11.8 3.2 9.8 3.2 6.6V3z"></path>
              <path d="M8 5.1v5.4"></path>
              <path d="M5.8 7.3h4.4"></path>
            </svg>
          </button>
          <details class="topbar-notification-menu" data-query-notifications>
            <summary
              class="topbar-action-button topbar-action-button-icon-only"
              aria-label="Notifications"
              title="Notifications"
            >
              <span class="topbar-notification-badge" data-query-notification-count hidden>0</span>
              <svg class="topbar-action-icon" viewBox="0 0 16 16" aria-hidden="true">
                <path d="M3.2 11.6h9.6l-1.1-1.6V6.8a3.7 3.7 0 0 0-7.4 0V10z"></path>
                <path d="M6.2 12.1a1.9 1.9 0 0 0 3.6 0"></path>
              </svg>
            </summary>
            <div class="topbar-notification-panel">
              <div class="topbar-notification-header">
                <strong>Messages</strong>
                <button type="button" class="topbar-notification-clear" data-clear-notifications hidden>
                  Clear
                </button>
              </div>
              <div class="topbar-notification-list" data-query-notification-list>
                <p class="topbar-notification-empty">No notifications yet.</p>
              </div>
            </div>
          </details>
          <details class="topbar-notification-menu topbar-settings-menu" data-settings-menu data-runtime-version="{{ runtime.image_version }}">
            <summary
              class="topbar-action-button topbar-action-button-icon-only"
              aria-label="Settings"
              title="Settings"
            >
              <svg class="topbar-action-icon" viewBox="0 0 16 16" aria-hidden="true">
                <path d="M6.7 1.9h2.6l.4 1.4c.36.1.7.25 1.02.43l1.31-.69 1.84 1.84-.69 1.31c.18.32.33.66.43 1.02l1.4.4v2.6l-1.4.4c-.1.36-.25.7-.43 1.02l.69 1.31-1.84 1.84-1.31-.69c-.32.18-.66.33-1.02.43l-.4 1.4H6.7l-.4-1.4a4.2 4.2 0 0 1-1.02-.43l-1.31.69-1.84-1.84.69-1.31a4.2 4.2 0 0 1-.43-1.02l-1.4-.4v-2.6l1.4-.4c.1-.36.25-.7.43-1.02l-.69-1.31 1.84-1.84 1.31.69c.32-.18.66-.33 1.02-.43z"></path>
                <circle cx="8" cy="8" r="2.05"></circle>
              </svg>
            </summary>
            <div class="topbar-notification-panel topbar-settings-panel">
              <div class="topbar-notification-header">
                <strong>Settings</strong>
              </div>
              <div class="topbar-settings-actions">
                <button type="button" class="topbar-settings-action" data-clear-local-cache>
                  <span class="topbar-settings-action-title">Clear local cache</span>
                  <span class="topbar-settings-action-copy">
                    Delete all locally stored notebooks, drafts, versions, and browser workspace state.
                  </span>
                </button>
                <button type="button" class="topbar-settings-action" data-open-about>
                  <span class="topbar-settings-action-title">About</span>
                  <span class="topbar-settings-action-copy">
                    Show the running version and the purpose of this prototype.
                  </span>
                </button>
                <button type="button" class="topbar-settings-action" data-open-feature-list>
                  <span class="topbar-settings-action-title">Feature list</span>
                  <span class="topbar-settings-action-copy">
                    Review user-facing changes and major fixes by version.
                  </span>
                </button>
              </div>
            </div>
          </details>
        </div>
      </header>

      <section id="workspace-panel">
        {% include workspace_partial_template %}
      </section>
    </main>
  </div>
  <script id="source-options" type="application/json">{{ source_options_json | safe }}</script>
  <script id="feature-release-notes" type="application/json">{{ release_notes_json | safe }}</script>
{% endblock %}
