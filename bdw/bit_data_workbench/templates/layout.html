<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', path='img/favicon.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', path='img/favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
  </head>
  <body>
    {% block body %}{% endblock %}

    <dialog class="modal-dialog" data-folder-name-dialog>
      <form method="dialog" class="modal-card" data-folder-name-form>
        <h2 class="modal-title" data-folder-name-title>Folder</h2>
        <p class="modal-copy" data-folder-name-copy>Enter a folder name.</p>
        <input
          class="modal-input"
          type="text"
          name="folder_name"
          data-folder-name-input
          autocomplete="off"
        >
        <menu class="modal-actions">
          <button class="modal-button modal-button-secondary" type="button" data-modal-cancel>
            Cancel
          </button>
          <button class="modal-button" type="submit" value="confirm" data-folder-name-submit>
            Save
          </button>
        </menu>
      </form>
    </dialog>

    <dialog class="modal-dialog" data-confirm-dialog>
      <form method="dialog" class="modal-card" data-confirm-form>
        <h2 class="modal-title" data-confirm-title>Confirm</h2>
        <p class="modal-copy" data-confirm-copy>Continue?</p>
        <menu class="modal-actions">
          <button class="modal-button modal-button-secondary" type="button" data-modal-cancel>
            Cancel
          </button>
          <button class="modal-button modal-button-danger" type="submit" value="confirm" data-confirm-submit>
            Delete
          </button>
        </menu>
      </form>
    </dialog>

    <script id="sql-schema" type="application/json">{{ completion_schema_json | safe }}</script>
    <script src="{{ url_for('static', path='vendor/htmx.min.js') }}"></script>
    <script type="module" src="{{ url_for('static', path='js/app.js') }}"></script>
  </body>
</html>
