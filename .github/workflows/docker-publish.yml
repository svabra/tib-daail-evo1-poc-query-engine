name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - image_name: tib-daail-evo1-poc-query-engine
            image_repository: docker.io/svabra/tib-daail-evo1-poc-query-engine
            dockerfile: ./Dockerfile
            build_context: .
            image_archive: /tmp/tib-daail-evo1-poc-query-engine.tar
            artifact_name: duckdb-image
            include_latest: true
            include_ref_tag: true
            include_sha: true
          - image_name: bit-data-workbench
            image_repository: docker.io/svabra/bit-data-workbench
            dockerfile: ./bdw/Dockerfile
            build_context: .
            image_archive: /tmp/bit-data-workbench.tar
            artifact_name: bit-data-workbench-image
            include_latest: false
            include_ref_tag: false
            include_sha: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read image version
        id: version
        shell: bash
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          if [ -z "$version" ]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Prepare Docker tag rules
        id: tag_rules
        shell: bash
        run: |
          {
            echo 'rules<<EOF'
            echo "type=raw,value=${{ steps.version.outputs.version }}"
            if [ "${{ matrix.image.include_latest }}" = "true" ]; then
              echo "type=raw,value=latest,enable={{is_default_branch}}"
            fi
            if [ "${{ matrix.image.include_ref_tag }}" = "true" ]; then
              echo "type=ref,event=tag"
            fi
            if [ "${{ matrix.image.include_sha }}" = "true" ]; then
              echo "type=sha,prefix=sha-"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image.image_repository }}
          tags: ${{ steps.tag_rules.outputs.rules }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image.image_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Write Docker image tags
        shell: bash
        run: |
          printf '%s\n' "${{ steps.meta.outputs.tags }}" > /tmp/docker-tags.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image archive
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.build_context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          build-args: |
            IMAGE_VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=${{ matrix.image.image_archive }}
          cache-from: type=gha,scope=${{ matrix.image.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.image_name }}

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.image.artifact_name }}
          path: |
            ${{ matrix.image.image_archive }}
            /tmp/docker-tags.txt
          if-no-files-found: error
          retention-days: 1

  upload:
    if: github.event_name != 'pull_request'
    needs:
      - build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - image_name: tib-daail-evo1-poc-query-engine
            image_archive_name: tib-daail-evo1-poc-query-engine.tar
            artifact_name: duckdb-image
          - image_name: bit-data-workbench
            image_archive_name: bit-data-workbench.tar
            artifact_name: bit-data-workbench-image

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.image.artifact_name }}
          path: /tmp/docker-image

      - name: Load Docker image archive
        run: docker load -i /tmp/docker-image/${{ matrix.image.image_archive_name }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: svabra
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Upload Docker image
        shell: bash
        run: |
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              docker push "$tag"
            fi
          done < /tmp/docker-image/docker-tags.txt
