services:
  bit-data-workbench:
    build:
      context: .
      dockerfile: bdw/Dockerfile
    image: bit-data-workbench:local
    container_name: bit-data-workbench
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      minio-seed:
        condition: service_completed_successfully
    environment:
      IMAGE_VERSION: "0.3.26"
      PORT: "8000"
      MAX_RESULT_ROWS: "200"
      DUCKDB_DATABASE: /workspace/bit-data-workbench.duckdb
      DUCKDB_EXTENSION_DIRECTORY: /opt/duckdb/extensions
      S3_ENDPOINT: minio:9000
      S3_BUCKET: vat-smoke-test
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_URL_STYLE: path
      S3_USE_SSL: "false"
      S3_VERIFY_SSL: "false"
      S3_STARTUP_VIEW_SCHEMA: s3
      S3_STARTUP_VIEWS: vat_smoke=csv:s3://vat-smoke-test/startup/vat_smoke.csv
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: evo1
      PG_PASSWORD: evo1
      PG_OLTP_DATABASE: evo1_oltp
      PG_OLAP_DATABASE: evo1_olap
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/workspace
    restart: unless-stopped

  tib-daail-evo1-poc-query-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: tib-daail-evo1-poc-query-engine:local
    container_name: tib-daail-evo1-poc-query-engine
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      minio-seed:
        condition: service_completed_successfully
    environment:
      DUCKDB_UI_PORT: "4213"
      DUCKDB_DATABASE: /workspace/workspace.duckdb
      DUCKDB_EXTRA_EXTENSIONS: httpfs,postgres
      S3_ENDPOINT: minio:9000
      S3_BUCKET: vat-smoke-test
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_URL_STYLE: path
      S3_USE_SSL: "false"
      S3_VERIFY_SSL: "false"
      S3_STARTUP_VIEW_SCHEMA: s3
      S3_STARTUP_VIEWS: vat_smoke=csv:s3://vat-smoke-test/startup/vat_smoke.csv
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: evo1
      PG_PASSWORD: evo1
      PG_OLTP_DATABASE: evo1_oltp
      PG_OLAP_DATABASE: evo1_olap
    ports:
      - "4213:4213"
    volumes:
      - ./workspace:/workspace
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: tib-daail-evo1-poc-query-engine-minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: tib-daail-evo1-poc-query-engine-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/vat-smoke-test
    restart: "no"

  minio-seed:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: tib-daail-evo1-poc-query-engine-minio-seed
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        printf 'vat_id,canton_code,category\n1,ZH,standard\n2,BE,reduced\n3,GE,exempt\n' > /tmp/vat_smoke.csv &&
        mc cp /tmp/vat_smoke.csv local/vat-smoke-test/startup/vat_smoke.csv
    restart: "no"

  postgres:
    image: postgres:17
    container_name: tib-daail-evo1-poc-query-engine-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: evo1
      POSTGRES_PASSWORD: evo1
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tib-daail-evo1-poc-query-engine-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@daail.io
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_DISABLE_POSTFIX: "True"
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./docker/pgadmin/pgpass:/pgpass:ro
    restart: unless-stopped

volumes:
  minio-data:
  postgres-data:
  pgadmin-data:
